<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEPOT.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#c0c0bc;min-height:100vh;color:#1a1a1a;display:flex;flex-direction:column}
#page-wrap{flex:1;display:flex;flex-direction:column}

/* HEADER */
.header{background:#c0c0bc;padding:2.5rem 2rem 0}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.site-title{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#1a1a1a;line-height:1}
.site-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-top:8px}
.header-top-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.live-clock{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#888;white-space:nowrap}
.count-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#888;white-space:nowrap}

/* SEARCH */
.search-row{padding-bottom:1.5rem;display:flex;gap:8px;align-items:center}
.search-input{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:10px 16px;border:1px solid rgba(0,0,0,0.15);border-radius:2px;background:rgba(255,255,255,0.3);color:#1a1a1a;outline:none;flex:1}
.search-input::placeholder{color:#aaa}
.search-input:focus{background:rgba(255,255,255,0.5);border-color:rgba(0,0,0,0.3)}
.lucky-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:10px 16px;border:1px solid rgba(0,0,0,0.18);border-radius:2px;background:transparent;color:#777;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.lucky-btn:hover{background:#1a1a1a;color:#c0c0bc;border-color:#1a1a1a}

/* FILTER BAR */
.filter-bar{background:#c0c0bc;padding:0 2rem 1.5rem;display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:1px solid rgba(0,0,0,0.18);border-radius:2px;background:transparent;color:#777;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{background:rgba(255,255,255,0.35);color:#1a1a1a;border-color:rgba(0,0,0,0.3)}
.filter-btn.active{background:#1a1a1a;border-color:#1a1a1a;color:#c0c0bc}

/* GRID */
.grid-wrap{background:#c0c0bc;padding:3px;flex:1}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.grid{grid-template-columns:1fr}}

/* TILE */
.tile{
  background:#f0f0ec;
  padding:1.5rem 1.5rem 1.75rem;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:220px;
  position:relative;
  transition:background .15s;
  color:#1a1a1a;
  border-radius:10px;
}
.tile:hover{background:#ffffff}
.tile:hover .tile-num{color:#bbb}
.tile:hover .tile-name{color:#1a1a1a}
.tile:hover .tile-desc{color:#999}
.tile:hover .tile-category{color:#999;border-color:rgba(0,0,0,0.15)}

/* TILE TOP */
.tile-top{display:flex;align-items:center;justify-content:space-between}
.tile-top-left{display:flex;align-items:center;gap:8px}
.tile-num{font-size:10px;letter-spacing:.08em;color:#bbb;font-weight:400}
.tile-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0;border-radius:4px}
.tile-logo-fallback{width:28px;height:28px;display:none;align-items:center;justify-content:center;font-size:9px;color:#ccc;flex-shrink:0}

/* ARROW */
.tile-arrow{
  position:absolute;
  top:1rem;right:1rem;
  width:24px;height:24px;
  border-radius:50%;
  background:transparent;
  border:1px solid #bbb;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity .15s,transform .15s;
  transform:translate(-3px,3px);
  flex-shrink:0;
}
.tile-arrow svg{width:9px;height:9px;stroke:#bbb;fill:none;stroke-width:1.2;stroke-linecap:square;stroke-linejoin:miter;display:block}
.tile:hover .tile-arrow{opacity:1;transform:translate(0,0)}

/* TILE BOTTOM */
.tile-bottom{display:flex;flex-direction:column;gap:8px}
.tile-category{
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  color:#999;
  display:inline-block;
  border:1px solid rgba(0,0,0,0.15);
  padding:3px 7px;
  border-radius:2px;
  align-self:flex-start;
}
.tile-name{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:#1a1a1a;line-height:1.35}
.tile-desc{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:#999;line-height:1.8}

/* NEW BADGE */
.tile-new{
  font-size:7px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  background:#1a1a1a;color:#f0f0ec;
  padding:2px 5px;border-radius:2px;
  margin-left:6px;vertical-align:middle;
  display:inline-block;position:relative;top:-1px;
}

/* FAV BADGE */
.tile-fav{
  display:inline-flex;align-items:center;justify-content:center;
  position:relative;width:26px;height:26px;
  margin-left:6px;vertical-align:middle;top:-1px;
  flex-shrink:0;
}

.tile.hidden{display:none}
.empty{grid-column:1/-1;text-align:center;padding:4rem;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;background:#f0f0ec;border-radius:10px}

/* PRELOADER */
#preloader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  gap:2rem;
  z-index:9999;
  transition:opacity .6s ease, visibility .6s ease;
}
#preloader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.preloader-title{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#f0f0ec}
.preloader-divider{width:1px;height:18px;background:rgba(255,255,255,0.2);flex-shrink:0}
.preloader-sub{font-family:'DM Mono',monospace;font-size:9px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:#555}

/* FOOTER */
.footer{background:#c0c0bc;padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center}
.footer span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#888}
@media(max-width:700px){.footer{flex-direction:column;gap:6px;text-align:center}}
</style>
</head>

function getFavicon(d){return`https://www.google.com/s2/favicons?domain=${d}&sz=64`}

function buildGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  resources.forEach((r,i)=>{
    const a=document.createElement('a');
    a.className='tile';
    a.dataset.categories=JSON.stringify(r.cat);
    a.href=r.url;
    a.target='_blank';
    a.rel='noopener noreferrer';
    const initials=r.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const num=String(i+1).padStart(2,'0');
    const catMap={'ui-ux':'UI / UX','typography':'Typography','color':'Color','blogs':'Blogs','campaign':'Campaign Inspo','visual-inspo':'Visual Inspo','stock':'Stock & Assets','icons':'Icons','mockups':'Mockups','ai':'AI','extensions':'Extensions','email':'Email Inspo','presentation':'Presentation','utilities':'Utilities'};
    const catLabel=r.cat.map(c=>catMap[c]||c).map(c=>`<div class="tile-category">${c}</div>`).join('');
    const newBadge=r.isNew?`<span class="tile-new">New</span>`:'';
    const favBadge=r.isFav?(()=>{
      const cx=50,cy=50,outerR=46,innerR=38,pts=16;
      let d='';
      for(let i=0;i<pts*2;i++){
        const angle=(Math.PI/pts)*i - Math.PI/2;
        const r=i%2===0?outerR:innerR;
        const x=cx+r*Math.cos(angle);
        const y=cy+r*Math.sin(angle);
        d+=(i===0?'M':'L')+x.toFixed(2)+','+y.toFixed(2);
      }
      d+='Z';
      return `<span class="tile-fav"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path fill="none" stroke="#1a1a1a" stroke-width="3" d="${d}"/><text x="50" y="50" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-family="DM Mono,monospace" font-size="22" font-weight="500" letter-spacing="1">FAV</text></svg></span>`;
    })():'';    a.innerHTML=`
      <div class="tile-top">
        <div class="tile-top-left">
          <img class="tile-logo" src="${getFavicon(r.domain)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="tile-logo-fallback">${initials}</div>
          <span class="tile-num">${num}</span>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-cats" style="display:flex;gap:4px;flex-wrap:wrap">${catLabel}</div>
        <div class="tile-name">${r.name}${newBadge}${favBadge}</div>
        <div class="tile-desc">${r.desc}</div>
      </div>
      <div class="tile-arrow"><svg viewBox="0 0 10 10"><line x1="2" y1="8" x2="8" y2="2"/><polyline points="4 2 8 2 8 6"/></svg></div>
    `;
    grid.appendChild(a);
  });
}

let currentFilter='all';
function setFilter(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterTiles();
}
function filterTiles(){
  const q=document.getElementById('search').value.toLowerCase();
  let visible=0;
  document.querySelectorAll('.tile').forEach(t=>{
    const cats=JSON.parse(t.dataset.categories||'[]');
    const catMatch=currentFilter==='all'||cats.includes(currentFilter);
    const searchMatch=!q||t.textContent.toLowerCase().includes(q);
    if(catMatch&&searchMatch){t.style.display='flex';visible++;}
    else t.style.display='none';
  });
  document.getElementById('count').textContent=visible+' resources';
  const grid=document.getElementById('grid');
  let empty=grid.querySelector('.empty');
  if(visible===0){if(!empty){const d=document.createElement('div');d.className='empty';d.textContent='No resources found.';grid.appendChild(d);}}
  else if(empty)empty.remove();
}

/* LIVE CLOCK */
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m+':'+s;
}
updateClock();
setInterval(updateClock,1000);

/* FEELING LUCKY / R KEY */
function openRandom(){
  const visible=Array.from(document.querySelectorAll('.tile')).filter(t=>t.style.display!=='none');
  if(visible.length===0) return;
  const random=visible[Math.floor(Math.random()*visible.length)];
  random.style.outline='2px solid #1a1a1a';
  setTimeout(()=>{random.style.outline='';window.open(random.href,'_blank');},200);
}
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){
    if(document.activeElement.tagName==='INPUT') return;
    openRandom();
  }
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

/* PRELOADER */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('preloader').classList.add('hidden');
  },1800);
});

shuffle(resources);
buildGrid();
filterTiles();
</script>
</body>
</html>
